rootDir: apps/web

runConfig:
  concurrency: 80
  cpu: 1
  memoryMiB: 1024
  minInstances: 0
  maxInstances: 10

env:
  - variable: OPENROUTER_API_KEY
    secret: OPENROUTER_API_KEY
    availability:
      - BUILD
      - RUNTIME
  - variable: HOSTNAME
    value: 0.0.0.0
    availability:
      - RUNTIME
